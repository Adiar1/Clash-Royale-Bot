{% extends "base.html" %}
{% block title %}Environment{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Environment (.env)</h1>
</div>

<div class="card">
    <form method="post" onsubmit="return confirm('Save changes to .env? The bot must be restarted for changes to take effect.');">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="field">
            <textarea name="env_content" spellcheck="false">{{ env_content }}</textarea>
        </div>
        <button type="submit" class="btn">Save changes</button>
    </form>
    <p class="card-hint">Changes are written to disk immediately but only apply after the bot is restarted.</p>
</div>
{% endblock %}
